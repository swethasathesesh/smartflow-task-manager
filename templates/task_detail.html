<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details - Task Management Pro</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-check-circle-fill"></i> Task Management Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center" id="navbarUser">
                    <li class="nav-item">
                        <a class="nav-link" href="/login">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary ms-lg-2 mt-2 mt-lg-0" href="/register">Get Started</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Task Detail Content -->
    <div class="container py-4">
        <div class="row mb-3">
            <div class="col">
                <a href="/dashboard" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>

        <div id="taskContent">
            <!-- Task details will be loaded here -->
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil"></i> Edit Task
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editTaskForm">
                        <div class="mb-3">
                            <label for="editTaskTitle" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="editTaskTitle" required>
                        </div>

                        <div class="mb-3">
                            <label for="editTaskDescription" class="form-label">Description *</label>
                            <textarea class="form-control" id="editTaskDescription" rows="3" required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editTaskPriority" class="form-label">Priority</label>
                                <select class="form-select" id="editTaskPriority">
                                    <option value="low">Low</option>
                                    <option value="medium">Medium</option>
                                    <option value="high">High</option>
                                    <option value="urgent">Urgent</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="editTaskStatus" class="form-label">Status</label>
                                <select class="form-select" id="editTaskStatus">
                                    <option value="todo">Todo</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="editTaskStartTime" class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="editTaskStartTime">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="editTaskDueDate" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="editTaskDueDate">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="editTaskEndTime" class="form-label">End Time (when completed)</label>
                            <input type="datetime-local" class="form-control" id="editTaskEndTime">
                        </div>

                        <div class="mb-3">
                            <label for="editTaskTags" class="form-label">Tags (comma separated)</label>
                            <input type="text" class="form-control" id="editTaskTags" 
                                   placeholder="work, urgent, personal">
                        </div>

                        <div class="mb-3">
                            <label for="editTaskNotes" class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="editTaskNotes" rows="3"></textarea>
                        </div>

                        <div id="editTaskError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitEditTask()">
                        <i class="bi bi-check-circle"></i> Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this task? This action cannot be undone.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDeleteTask()">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    
    <script>
        let currentTask = null;

        // Check authentication
        if (!requireAuth()) {
            // Will redirect to login
        }

        // Get task ID from URL
        const pathParts = window.location.pathname.split('/');
        const taskId = pathParts[pathParts.length - 1];

        // Load task on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await loadTask();
        });

        async function loadTask() {
            const container = document.getElementById('taskContent');
            showLoading('taskContent');
            
            try {
                currentTask = await getTask(taskId);
                displayTask(currentTask);
            } catch (error) {
                container.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> Failed to load task: ${error.message}
                    </div>
                `;
            }
        }

        function displayTask(task) {
            const priorityClass = `badge-${task.priority}`;
            const statusClass = `badge-${task.status.replace('_', '-')}`;
            
            const html = `
                <div class="row">
                    <div class="col-lg-8">
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <div>
                                        <h1 class="h3 mb-2">${task.title}</h1>
                                        <div class="d-flex gap-2 flex-wrap">
                                            <span class="badge badge-priority ${priorityClass}">
                                                <i class="bi bi-flag-fill"></i> ${task.priority.toUpperCase()}
                                            </span>
                                            <span class="badge badge-status ${statusClass}">
                                                <i class="bi bi-circle-fill"></i> ${task.status.replace('_', ' ').toUpperCase()}
                                            </span>
                                        </div>
                                    </div>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" 
                                                data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li>
                                                <a class="dropdown-item" href="#" onclick="openEditModal()">
                                                    <i class="bi bi-pencil"></i> Edit
                                                </a>
                                            </li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <a class="dropdown-item text-danger" href="#" onclick="openDeleteModal()">
                                                    <i class="bi bi-trash"></i> Delete
                                                </a>
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h5 class="text-muted mb-2">
                                        <i class="bi bi-file-text"></i> Description
                                    </h5>
                                    <p class="lead">${task.description}</p>
                                </div>

                                ${task.notes ? `
                                    <div class="mb-4">
                                        <h5 class="text-muted mb-2">
                                            <i class="bi bi-journal-text"></i> Additional Notes
                                        </h5>
                                        <p>${task.notes}</p>
                                    </div>
                                ` : ''}

                                ${task.tags && task.tags.length > 0 ? `
                                    <div class="mb-3">
                                        <h5 class="text-muted mb-2">
                                            <i class="bi bi-tags"></i> Tags
                                        </h5>
                                        <div class="task-tags">
                                            ${task.tags.map(tag => `<span class="task-tag">${tag}</span>`).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="card-title mb-3">
                                    <i class="bi bi-info-circle"></i> Task Information
                                </h5>
                                
                                <div class="mb-3">
                                    <small class="text-muted d-block mb-1">
                                        <i class="bi bi-calendar-event"></i> Created At
                                    </small>
                                    <strong>${formatDate(task.created_at)}</strong>
                                </div>

                                <div class="mb-3">
                                    <small class="text-muted d-block mb-1">
                                        <i class="bi bi-calendar-check"></i> Last Updated
                                    </small>
                                    <strong>${formatDate(task.updated_at)}</strong>
                                </div>

                                ${task.start_time ? `
                                    <div class="mb-3">
                                        <small class="text-muted d-block mb-1">
                                            <i class="bi bi-play-circle"></i> Start Time
                                        </small>
                                        <strong>${formatDate(task.start_time)}</strong>
                                    </div>
                                ` : ''}

                                ${task.due_date ? `
                                    <div class="mb-3">
                                        <small class="text-muted d-block mb-1">
                                            <i class="bi bi-alarm"></i> Due Date
                                        </small>
                                        <strong class="${new Date(task.due_date) < new Date() && task.status !== 'completed' ? 'text-danger' : ''}">
                                            ${formatDateWithRelative(task.due_date)}
                                        </strong>
                                        ${new Date(task.due_date) < new Date() && task.status !== 'completed' ? 
                                            '<br><small class="text-danger"><i class="bi bi-exclamation-triangle"></i> Overdue</small>' : ''}
                                    </div>
                                ` : ''}

                                ${task.end_time ? `
                                    <div class="mb-3">
                                        <small class="text-muted d-block mb-1">
                                            <i class="bi bi-stop-circle"></i> Completed At
                                        </small>
                                        <strong class="text-success">${formatDate(task.end_time)}</strong>
                                        ${task.start_time ? `
                                            <br><small class="text-muted">
                                                <i class="bi bi-clock"></i> Duration: ${calculateDuration(task.start_time, task.end_time)}
                                            </small>
                                        ` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="card shadow-sm">
                            <div class="card-body">
                                <h5 class="card-title mb-3">
                                    <i class="bi bi-lightning"></i> Quick Actions
                                </h5>
                                
                                <div class="d-grid gap-2">
                                    ${task.status !== 'in_progress' ? `
                                        <button class="btn btn-warning" onclick="updateTaskStatus('in_progress')">
                                            <i class="bi bi-play-circle"></i> Start Task
                                        </button>
                                    ` : ''}
                                    
                                    ${task.status !== 'completed' ? `
                                        <button class="btn btn-success" onclick="updateTaskStatus('completed')">
                                            <i class="bi bi-check-circle"></i> Mark Complete
                                        </button>
                                    ` : ''}
                                    
                                    ${task.status === 'completed' ? `
                                        <button class="btn btn-secondary" onclick="updateTaskStatus('todo')">
                                            <i class="bi bi-arrow-counterclockwise"></i> Reopen Task
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('taskContent').innerHTML = html;
        }

        function openEditModal() {
            if (!currentTask) return;
            
            document.getElementById('editTaskTitle').value = currentTask.title;
            document.getElementById('editTaskDescription').value = currentTask.description;
            document.getElementById('editTaskPriority').value = currentTask.priority;
            document.getElementById('editTaskStatus').value = currentTask.status;
            document.getElementById('editTaskStartTime').value = formatDateForInput(currentTask.start_time);
            document.getElementById('editTaskDueDate').value = formatDateForInput(currentTask.due_date);
            document.getElementById('editTaskEndTime').value = formatDateForInput(currentTask.end_time);
            document.getElementById('editTaskTags').value = currentTask.tags ? currentTask.tags.join(', ') : '';
            document.getElementById('editTaskNotes').value = currentTask.notes || '';
            
            const modal = new bootstrap.Modal(document.getElementById('editTaskModal'));
            modal.show();
        }

        async function submitEditTask() {
            const form = document.getElementById('editTaskForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const title = document.getElementById('editTaskTitle').value;
            const description = document.getElementById('editTaskDescription').value;
            const priority = document.getElementById('editTaskPriority').value;
            const status = document.getElementById('editTaskStatus').value;
            const startTime = document.getElementById('editTaskStartTime').value;
            const dueDate = document.getElementById('editTaskDueDate').value;
            const endTime = document.getElementById('editTaskEndTime').value;
            const tagsInput = document.getElementById('editTaskTags').value;
            const notes = document.getElementById('editTaskNotes').value;
            
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            // Convert datetime-local values to ISO strings
            const taskData = {
                title,
                description,
                priority,
                status,
                tags,
                notes: notes || null,
                start_time: startTime ? new Date(startTime).toISOString() : null,
                due_date: dueDate ? new Date(dueDate).toISOString() : null,
                end_time: endTime ? new Date(endTime).toISOString() : null
            };
            
            try {
                await updateTask(taskId, taskData);
                showToast('Task updated successfully!', 'success');
                
                // Close modal
                const modal = bootstrap.Modal.getInstance(document.getElementById('editTaskModal'));
                modal.hide();
                
                // Reload task
                await loadTask();
            } catch (error) {
                const errorDiv = document.getElementById('editTaskError');
                errorDiv.textContent = 'Failed to update task: ' + error.message;
                errorDiv.classList.remove('d-none');
            }
        }

        async function updateTaskStatus(newStatus) {
            try {
                const updateData = { status: newStatus };
                
                // Handle end time based on status change
                if (newStatus === 'completed') {
                    // Set end time to now if not already set
                    if (!currentTask.end_time) {
                        updateData.end_time = new Date().toISOString();
                        showToast('Task completed! End time set to now.', 'success');
                    }
                } else if (currentTask.status === 'completed' && newStatus !== 'completed') {
                    // Clear end time when reopening a completed task
                    updateData.end_time = null;
                    showToast('Task reopened! End time cleared.', 'info');
                }
                
                // Set start time if moving to in_progress and not already set
                if (newStatus === 'in_progress' && !currentTask.start_time) {
                    updateData.start_time = new Date().toISOString();
                    showToast('Task started! Start time set to now.', 'info');
                }
                
                await updateTask(taskId, updateData);
                showToast('Task status updated!', 'success');
                await loadTask();
            } catch (error) {
                showToast('Failed to update status: ' + error.message, 'danger');
            }
        }

        function openDeleteModal() {
            const modal = new bootstrap.Modal(document.getElementById('deleteTaskModal'));
            modal.show();
        }

        async function confirmDeleteTask() {
            try {
                await deleteTask(taskId);
                showToast('Task deleted successfully!', 'success');
                
                // Close modal and redirect
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            } catch (error) {
                showToast('Failed to delete task: ' + error.message, 'danger');
            }
        }
    </script>
</body>
</html>
