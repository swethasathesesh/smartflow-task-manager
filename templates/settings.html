<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Task Management Pro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .activity-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .settings-section {
            margin-bottom: 2.5rem;
        }
        .settings-section h4 {
            color: #4361ee;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #f0f0f0;
        }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            padding: 1.5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-card h5 {
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .stat-card h3 {
            color: #212529;
            font-weight: 700;
            margin-bottom: 0;
        }
        .stat-card .icon {
            font-size: 2rem;
            color: #4361ee;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-check-circle-fill"></i> Task Management Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard"><i class="bi bi-house-door"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile"><i class="bi bi-person"></i> Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/settings"><i class="bi bi-gear"></i> Settings</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="me-3 d-none d-md-inline">Hello, <span id="username">User</span></span>
                    <a href="/logout" class="btn btn-outline-danger">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="mb-4"><i class="bi bi-gear me-2"></i>Settings</h2>
            </div>
        </div>

        <!-- Activity Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="icon"><i class="bi bi-list-check"></i></div>
                    <h5>Total Tasks</h5>
                    <h3 id="total-tasks">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="icon"><i class="bi bi-check-circle"></i></div>
                    <h5>Completed</h5>
                    <h3 id="completed-tasks">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="icon"><i class="bi bi-clock"></i></div>
                    <h5>In Progress</h5>
                    <h3 id="inprogress-tasks">0</h3>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="icon"><i class="bi bi-exclamation-triangle"></i></div>
                    <h5>Overdue</h5>
                    <h3 id="overdue-tasks">0</h3>
                </div>
            </div>
        </div>

        <!-- Activity Graph -->
        <div class="row">
            <div class="col-12">
                <div class="card activity-card">
                    <div class="card-body">
                        <h4 class="card-title mb-4">Activity Overview (Last 7 Days)</h4>
                        <canvas id="activityChart" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Additional Settings Sections -->
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card settings-section">
                    <div class="card-body">
                        <h4>Account Settings</h4>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="email" value="user@example.com" disabled>
                        </div>
                        <div class="mb-3">
                            <label for="timezone" class="form-label">Timezone</label>
                            <select class="form-select" id="timezone">
                                <option value="-12:00">(GMT-12:00) International Date Line West</option>
                                <option value="-05:00" selected>(GMT-05:00) Eastern Time</option>
                                <option value="+05:30">(GMT+05:30) India Standard Time</option>
                            </select>
                        </div>
                        <button class="btn btn-primary">Update Account</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card settings-section">
                    <div class="card-body">
                        <h4>Notification Preferences</h4>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="emailNotifications" checked>
                            <label class="form-check-label" for="emailNotifications">Email Notifications</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="taskReminders" checked>
                            <label class="form-check-label" for="taskReminders">Task Reminders</label>
                        </div>
                        <div class="form-check form-switch mb-3">
                            <input class="form-check-input" type="checkbox" id="weeklyReports" checked>
                            <label class="form-check-label" for="weeklyReports">Weekly Reports</label>
                        </div>
                        <button class="btn btn-primary">Save Preferences</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Get user data from localStorage or session
        document.addEventListener('DOMContentLoaded', function() {
            // Get username from localStorage or use a default
            const username = localStorage.getItem('username') || 'User';
            document.getElementById('username').textContent = username;
            
            // Initialize activity chart
            initActivityChart();
            
            // Load user stats
            loadUserStats();
        });

        // Initialize activity chart
        function initActivityChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            
            // Generate dates for the last 7 days
            const dates = [];
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(today.getDate() - i);
                dates.push(date.toLocaleDateString('en-US', { weekday: 'short' }));
            }
            
            // Sample data - in a real app, this would come from your API
            const completedData = [2, 5, 3, 7, 4, 6, 8];
            const inProgressData = [1, 3, 2, 4, 3, 2, 1];
            const overdueData = [0, 1, 0, 0, 2, 1, 0];
            
            // Update the stats cards
            document.getElementById('total-tasks').textContent = completedData[6] + inProgressData[6] + overdueData[6];
            document.getElementById('completed-tasks').textContent = completedData[6];
            document.getElementById('inprogress-tasks').textContent = inProgressData[6];
            document.getElementById('overdue-tasks').textContent = overdueData[6];
            
            // Create chart
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: 'Completed',
                            data: completedData,
                            backgroundColor: 'rgba(40, 167, 69, 0.7)',
                            borderColor: 'rgba(40, 167, 69, 1)',
                            borderWidth: 1
                        },
                        {
                            label: 'In Progress',
                            data: inProgressData,
                            backgroundColor: 'rgba(255, 193, 7, 0.7)',
                            borderColor: 'rgba(255, 193, 7, 1)',
                            borderWidth: 1
                        },
                        {
                            label: 'Overdue',
                            data: overdueData,
                            backgroundColor: 'rgba(220, 53, 69, 0.7)',
                            borderColor: 'rgba(220, 53, 69, 1)',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        x: {
                            stacked: true,
                            grid: {
                                display: false
                            }
                        },
                        y: {
                            stacked: true,
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false
                        }
                    }
                }
            });
        }
        
        // Load user stats from the server
        async function loadUserStats() {
            try {
                // In a real app, you would fetch this data from your API
                // const response = await fetch('/api/user/stats');
                // const data = await response.json();
                // Update the UI with the fetched data
                
                // For now, we're using the sample data from initActivityChart
                console.log('Loading user stats...');
            } catch (error) {
                console.error('Error loading user stats:', error);
            }
        }

        // === Notification Preferences Logic ===
        document.addEventListener('DOMContentLoaded', async function() {
            const userObj = localStorage.getItem('user');
            let user = null;
            try {
                user = userObj ? JSON.parse(userObj) : null;
            } catch(e) { user = null; }
            // Find toggle elements
            const emailNotificationsToggle = document.getElementById('emailNotifications');
            const taskRemindersToggle = document.getElementById('taskReminders');
            const weeklyReportsToggle = document.getElementById('weeklyReports');
            const saveBtn = document.querySelector('.settings-section .btn.btn-primary');

            if (!user || !user.id) {
                // You must be logged in to view settings
                return;
            }

            // Helper
            function showToast(message, type = 'info') {
                if (window.showToast) return window.showToast(message, type);
                // fallback
                alert(`[${type}] ${message}`);
            }

            // LOAD current settings
            async function loadPreferences() {
                try {
                    const settings = await window.getUserSettings(user.id);
                    // Defensive nested access
                    const s = settings.settings || settings;
                    // If undefined fallback to true/false
                    if (emailNotificationsToggle) emailNotificationsToggle.checked = !!s.email_notifications;
                    if (taskRemindersToggle) taskRemindersToggle.checked = !!s.task_reminders;
                    if (weeklyReportsToggle) weeklyReportsToggle.checked = !!s.weekly_reports;
                } catch(err) {
                    showToast('Could not load notification preferences!', 'danger');
                }
            }

            // SAVE settings
            async function savePreferences() {
                saveBtn.disabled = true;
                try {
                    // Fetch existing settings to avoid overwriting others
                    let settings = await window.getUserSettings(user.id);
                    settings = settings.settings || settings; // defensive again
                    // Update relevant fields
                    settings.email_notifications = emailNotificationsToggle ? emailNotificationsToggle.checked : true;
                    settings.task_reminders = taskRemindersToggle ? taskRemindersToggle.checked : true;
                    settings.weekly_reports = weeklyReportsToggle ? weeklyReportsToggle.checked : true;
                    // Save
                    await window.updateUserSettings(user.id, settings);
                    showToast('Preferences saved!', 'success');
                } catch(err) {
                    showToast('Could not save preferences. Please try again.', 'danger');
                } finally {
                    saveBtn.disabled = false;
                }
            }

            // On page load or navigation
            await loadPreferences();
            // Wire up save button
            if (saveBtn) {
                saveBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    savePreferences();
                });
            }
        });
    </script>
</body>
</html>
