<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Task Management Pro</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-check-circle-fill"></i> Task Management Pro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navbarUser">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile">Profile</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="logout()">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Dashboard Header -->
    <div class="bg-primary text-white py-4">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <h1 class="h2 mb-0" id="welcomeMessage">Task Dashboard</h1>
                    <p class="mb-0 opacity-75" id="dashboardSubtitle">Manage your tasks efficiently</p>
                </div>
                <div class="col-md-4 text-md-end mt-3 mt-md-0">
                    <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#createTaskModal">
                        <i class="bi bi-plus-circle"></i> Create New Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Content -->
    <div class="container-fluid py-4">
        <!-- Filter Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <div class="btn-group" role="group">
                                    <button type="button" class="btn btn-outline-primary active" onclick="filterTasks('all')">
                                        All Tasks
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" onclick="filterTasks('todo')">
                                        Todo
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" onclick="filterTasks('in_progress')">
                                        In Progress
                                    </button>
                                    <button type="button" class="btn btn-outline-primary" onclick="filterTasks('completed')">
                                        Completed
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                                <button class="btn btn-outline-secondary" onclick="loadTasks()">
                                    <i class="bi bi-arrow-clockwise"></i> Refresh
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Kanban Board -->
        <div class="row g-4">
            <!-- Todo Column -->
            <div class="col-lg-4">
                <div class="task-column todo">
                    <div class="task-column-header">
                        <i class="bi bi-list-task"></i> Todo
                        <span class="badge bg-primary rounded-pill float-end" id="todoCount">0</span>
                    </div>
                    <div id="todoTasks" class="task-list">
                        <!-- Tasks will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="col-lg-4">
                <div class="task-column in-progress">
                    <div class="task-column-header">
                        <i class="bi bi-hourglass-split"></i> In Progress
                        <span class="badge bg-warning rounded-pill float-end" id="inProgressCount">0</span>
                    </div>
                    <div id="inProgressTasks" class="task-list">
                        <!-- Tasks will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Completed Column -->
            <div class="col-lg-4">
                <div class="task-column completed">
                    <div class="task-column-header">
                        <i class="bi bi-check-circle"></i> Completed
                        <span class="badge bg-success rounded-pill float-end" id="completedCount">0</span>
                    </div>
                    <div id="completedTasks" class="task-list">
                        <!-- Tasks will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal fade" id="createTaskModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-plus-circle"></i> Create New Task
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createTaskForm">
                        <div class="mb-3">
                            <label for="taskTitle" class="form-label">Title *</label>
                            <input type="text" class="form-control" id="taskTitle" required>
                        </div>

                        <div class="mb-3">
                            <label for="taskDescription" class="form-label">Description *</label>
                            <textarea class="form-control" id="taskDescription" rows="3" required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="taskPriority" class="form-label">Priority</label>
                                <select class="form-select" id="taskPriority">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                    <option value="urgent">Urgent</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="taskStatus" class="form-label">Status</label>
                                <select class="form-select" id="taskStatus">
                                    <option value="todo" selected>Todo</option>
                                    <option value="in_progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="taskStartTime" class="form-label">Start Time</label>
                                <input type="datetime-local" class="form-control" id="taskStartTime">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="taskDueDate" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="taskDueDate">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="taskTags" class="form-label">Tags (comma separated)</label>
                            <input type="text" class="form-control" id="taskTags" 
                                   placeholder="work, urgent, personal">
                        </div>

                        <div class="mb-3">
                            <label for="taskNotes" class="form-label">Additional Notes</label>
                            <textarea class="form-control" id="taskNotes" rows="2"></textarea>
                        </div>

                        <div id="createTaskError" class="alert alert-danger d-none"></div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitCreateTask()">
                        <i class="bi bi-check-circle"></i> Create Task
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/main.js"></script>
    
    <script>
        let allTasks = [];
        let currentFilter = 'all';

        // Check authentication
        if (!requireAuth()) {
            // Will redirect to login
        }

        // Load user info and tasks on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('welcomeMessage').textContent = `Welcome back, ${user.first_name}!`;
                document.getElementById('dashboardSubtitle').textContent = `You have tasks to manage`;
            }
            
            await loadTasks();
        });

        async function loadTasks() {
            showLoading('todoTasks');
            showLoading('inProgressTasks');
            showLoading('completedTasks');
            
            try {
                allTasks = await getTasks();
                displayTasks();
            } catch (error) {
                showToast('Failed to load tasks: ' + error.message, 'danger');
            }
        }

        function displayTasks() {
            const todoContainer = document.getElementById('todoTasks');
            const inProgressContainer = document.getElementById('inProgressTasks');
            const completedContainer = document.getElementById('completedTasks');
            
            // Filter tasks based on current filter
            let tasksToDisplay = allTasks;
            if (currentFilter !== 'all') {
                tasksToDisplay = allTasks.filter(task => task.status === currentFilter);
            }
            
            // Separate tasks by status
            const todoTasks = tasksToDisplay.filter(task => task.status === 'todo');
            const inProgressTasks = tasksToDisplay.filter(task => task.status === 'in_progress');
            const completedTasks = tasksToDisplay.filter(task => task.status === 'completed');
            
            // Update counts
            document.getElementById('todoCount').textContent = todoTasks.length;
            document.getElementById('inProgressCount').textContent = inProgressTasks.length;
            document.getElementById('completedCount').textContent = completedTasks.length;
            
            // Display tasks
            todoContainer.innerHTML = todoTasks.length > 0 
                ? todoTasks.map(task => createTaskCard(task)).join('') 
                : '<div class="empty-state"><div class="empty-state-icon"><i class="bi bi-inbox"></i></div><p>No tasks here</p></div>';
            
            inProgressContainer.innerHTML = inProgressTasks.length > 0 
                ? inProgressTasks.map(task => createTaskCard(task)).join('') 
                : '<div class="empty-state"><div class="empty-state-icon"><i class="bi bi-inbox"></i></div><p>No tasks here</p></div>';
            
            completedContainer.innerHTML = completedTasks.length > 0 
                ? completedTasks.map(task => createTaskCard(task)).join('') 
                : '<div class="empty-state"><div class="empty-state-icon"><i class="bi bi-inbox"></i></div><p>No tasks here</p></div>';
        }

        function filterTasks(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.btn-group .btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            displayTasks();
        }

        async function submitCreateTask() {
            const form = document.getElementById('createTaskForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const priority = document.getElementById('taskPriority').value;
            const status = document.getElementById('taskStatus').value;
            const startTime = document.getElementById('taskStartTime').value;
            const dueDate = document.getElementById('taskDueDate').value;
            const tagsInput = document.getElementById('taskTags').value;
            const notes = document.getElementById('taskNotes').value;
            
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            const taskData = {
                title,
                description,
                priority,
                status,
                tags,
                notes: notes || null,
                start_time: startTime || null,
                due_date: dueDate || null
            };
            
            try {
                await createTask(taskData);
                showToast('Task created successfully!', 'success');
                
                // Close modal and reset form
                const modal = bootstrap.Modal.getInstance(document.getElementById('createTaskModal'));
                modal.hide();
                form.reset();
                
                // Reload tasks
                await loadTasks();
            } catch (error) {
                const errorDiv = document.getElementById('createTaskError');
                errorDiv.textContent = 'Failed to create task: ' + error.message;
                errorDiv.classList.remove('d-none');
            }
        }
    </script>
</body>
</html>
